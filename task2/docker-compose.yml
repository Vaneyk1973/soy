version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/marketplace
      -user=postgres
      -password=postgres
      -connectRetries=60
      migrate
    volumes:
      - ./db/migration:/flyway/sql:ro

  api:
    build: .
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/marketplace
      JWT_SECRET: dev-secret
      ACCESS_TOKEN_MINUTES: 20
      REFRESH_TOKEN_DAYS: 14
      ORDER_LIMIT_MINUTES: 5
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
